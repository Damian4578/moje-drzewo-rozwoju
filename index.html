<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Smart Home Dashboard</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.5); text-align: center; width: 300px; border: 1px solid #334155; }
        h1 { font-size: 1.2rem; color: #94a3b8; }
        .value { font-size: 3rem; font-weight: bold; margin: 1rem 0; color: #38bdf8; }
        .status { padding: 0.5rem 1rem; border-radius: 50px; background: #064e3b; color: #4ade80; font-size: 0.8rem; }
        input { width: 100%; margin-top: 2rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>POZIOM ŚWIATŁA</h1>
        <div class="value" id="lightValue">500</div>
        <div class="status" id="statusLabel">SYSTEM AKTYWNY</div>
        <input type="range" min="0" max="1023" value="500" oninput="updateView(this.value)">
        <p style="font-size: 0.7rem; color: #64748b; margin-top: 1rem;">Symulator Interfejsu Projektu</p>
    </div>

    <script>
        function updateView(val) {
            document.getElementById('lightValue').innerText = val;
            const status = document.getElementById('statusLabel');
            if(val < 500) {
                status.innerText = "ZASILANIE AWARYJNE: ON";
                status.style.background = "#7f1d1d";
                status.style.color = "#f87171";
            } else {
                status.innerText = "SYSTEM AKTYWNY";
                status.style.background = "#064e3b";
                status.style.color = "#4ade80";
            }
        }
    </script>
</body>
</html>
